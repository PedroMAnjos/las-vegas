<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loginScreen" class="login-wrapper">
        <div class="login-box">
            <div class="login-logo">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="app-title" style="font-size: 1.8rem; margin-bottom: 5px;">Painel Admin</h1>
            <p style="color:#888; font-size:0.8rem; margin-bottom:30px;">Coded By AnjoW</p>
            
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="loginUser" class="custom-input" placeholder="admin">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="loginPass" class="custom-input" placeholder="senha">
            </div>
            
            <button id="btnLogin" class="save-btn" style="margin-top: 20px;">ACESSAR SISTEMA</button>
            <p id="loginError" style="color:var(--alert-red); font-size:0.8rem; margin-top:15px; display:none;">Credenciais inválidas.</p>
        </div>
    </div>

    <div id="appScreen" style="display: none; width: 100%;">
        
        <nav class="bottom-nav">
            <div class="nav-brand-desktop" style="display: none;">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <div class="nav-item" id="navDashboard"><i class="fa-solid fa-calculator"></i><span>FINANCEIRO</span></div>
            <div class="nav-item active" id="navMediators"><i class="fa-solid fa-users"></i><span>MEDIADORES</span></div>
            <div class="nav-item" id="navReports"><i class="fa-solid fa-file-contract"></i><span>RELATÓRIOS</span></div>
            <div class="nav-item"><i class="fa-solid fa-gear"></i><span>AJUSTES</span></div>
        </nav>

        <div class="mobile-container">
            <header>
                <div class="header-left">
                    <i class="fa-solid fa-bars menu-icon"></i>
                    <h1 class="app-title" id="pageTitle">PAINEL ADMIN</h1>
                </div>
                <div class="header-actions">
                    <button class="icon-btn text-red" id="btnLogout" title="Sair">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                    <div class="avatar-small"><img src="https://i.pravatar.cc/150?img=11" alt="Perfil"></div>
                </div>
            </header>

            <div id="viewMediators">
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" placeholder="Buscar mediador..." id="searchInput">
                </div>
                
                <div class="filter-tabs">
                    <button class="tab active" data-filter="all">TODOS</button>
                    <button class="tab" data-filter="active">ATIVOS</button>
                    <button class="tab" data-filter="expiring">VENCENDO</button>
                    <button class="tab" data-filter="expired">EXPIRADOS</button>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-label">TOTAL MEDIADORES</span>
                        <span class="stat-number" id="totalCount">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label text-gold">STATUS ALERTA</span>
                        <span class="stat-number text-red" id="alertCount">0</span>
                    </div>
                </div>

                <div class="section-header">
                    <h2>MONITORAMENTO</h2>
                    <span class="online-count">Tempo Real</span>
                </div>

                <main class="mediator-list card-list" id="mediatorList"></main>
            </div>

            <div id="viewDashboard" style="display: none;">
                <div class="finance-desktop-grid">
                    <div class="balance-container">
                        <span class="balance-label">SALDO EM CAIXA</span>
                        <h1 class="balance-value" id="displayBalance">R$ 0,00</h1>
                    </div>

                    <div class="finance-controls">
                        <div class="fin-row income-group">
                            <div class="fin-col-sel">
                                <label>Entrada</label>
                                <select id="incCategory" class="fin-select">
                                    <option value="Contratação">Contratação</option>
                                    <option value="Renovação">Renovação</option>
                                    <option value="Divulgação">Divulgação</option>
                                </select>
                            </div>
                            <div class="fin-col-val"><label>Valor</label><input type="number" id="incValue" class="fin-input-small" placeholder="0,00"></div>
                            <button id="btnAddIncome" class="btn-fin-round income"><i class="fa-solid fa-plus"></i></button>
                        </div>
                        <div class="fin-row expense-group">
                            <div class="fin-col-sel">
                                <label>Saída</label>
                                <select id="expCategory" class="fin-select">
                                    <option value="Pagamento">Pagamento</option>
                                    <option value="Divulgação">Divulgação</option>
                                    <option value="Bot">Bot</option>
                                    <option value="Evento">Evento</option>
                                </select>
                            </div>
                            <div class="fin-col-val"><label>Valor</label><input type="number" id="expValue" class="fin-input-small" placeholder="0,00"></div>
                            <button id="btnAddExpense" class="btn-fin-round expense"><i class="fa-solid fa-minus"></i></button>
                        </div>
                    </div>
                </div>

                <div class="section-header">
                    <h2>EXTRATO</h2>
                    <span class="online-count" id="transCount">0 registros</span>
                </div>
                <div class="transaction-list" id="transactionList"></div>
            </div>

            <div id="viewReports" style="display: none;">
                <div class="section-header">
                    <h2>FECHAMENTO SEMANAL</h2>
                    <span class="online-count">Domingo a Sábado</span>
                </div>
                <div id="reportsList" class="reports-container"></div>
            </div>
            
            <div class="spacer-bottom"></div>
            <button class="fab" id="fabAddUser"><i class="fa-solid fa-plus"></i></button>
        </div>

        <div id="docsModal" class="modal">...</div>
        <div id="editModal" class="modal">...</div>
        <div id="addModal" class="modal">...</div>
        <div id="imageViewer" class="lightbox">...</div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
