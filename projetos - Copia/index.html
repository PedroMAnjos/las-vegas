<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ANJOW SS</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- LOGIN -->
<div class="login-wrapper" id="loginScreen">
    <div class="login-box">
        <div class="login-logo">⚜</div>
        <h2>ANJOW SS</h2>
        <input id="loginUser" placeholder="Usuário">
        <input id="loginPass" type="password" placeholder="Senha">
        <button class="save-btn" id="btnLogin">Entrar</button>
    </div>
</div>

<!-- APP -->
<div class="main-layout" id="appScreen" style="display:none;">

    <!-- SIDEBAR -->
    <nav class="side-nav">
        <div class="nav-brand">⚜ ANJOW</div>

        <div class="nav-item active">
            <i class="fa fa-users"></i>
            <span>Equipe</span>
        </div>

        <div class="nav-item">
            <i class="fa fa-dollar-sign"></i>
            <span>Financeiro</span>
        </div>
    </nav>

    <!-- CONTEÚDO -->
    <div class="content-area">

        <header>
            <div class="app-title">Painel Operacional</div>
            <div class="header-actions">
                <span id="clock"></span>
                <button id="btnLogout" class="action-btn text-red">Sair</button>
            </div>
        </header>

        <div class="desktop-controls">
            <div class="search-container">
                <i class="fa fa-search search-icon"></i>
                <input id="searchInput" placeholder="Buscar mediador...">
            </div>
        </div>

        <div class="mediator-list" id="mediatorList"></div>

        <div class="footer">
            Total: <span id="totalCount">0</span>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
