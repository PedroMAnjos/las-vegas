<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - AnjoW SS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loginScreen" class="login-wrapper">
        <div class="login-box">
            <div class="login-logo"><i class="fa-solid fa-shield-halved"></i></div>
            <h1 class="app-title">Painel Admin</h1>
            <p style="color:#888; font-size:0.8rem; margin-bottom:30px;">Acesso Restrito - Dev. Pedro Mestre</p>
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="loginUser" class="custom-input" placeholder="admin">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="loginPass" class="custom-input" placeholder="admin">
            </div>
            <button id="btnLogin" class="save-btn" style="margin-top: 20px;">ACESSAR SISTEMA</button>
            <p id="loginError" style="color:#ff4d4d; font-size:0.8rem; margin-top:15px; display:none;">Credenciais inválidas.</p>
        </div>
    </div>

    <div id="appScreen" style="display: none;">
        <div class="main-layout">
            
            <nav class="side-nav">
                <div class="nav-brand">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span class="app-title">ADMIN</span>
                </div>
                <div class="nav-item active" id="navMediators"><i class="fa-solid fa-users"></i><span>EQUIPE</span></div>
                <div class="nav-item" id="navDashboard"><i class="fa-solid fa-calculator"></i><span>FINANCEIRO</span></div>
                <div class="nav-item" id="navReports"><i class="fa-solid fa-file-contract"></i><span>RELATÓRIOS</span></div>
                <div class="nav-item" id="btnLogout"><i class="fa-solid fa-right-from-bracket"></i><span>SAIR</span></div>
            </nav>

            <main class="content-area">
                <header>
                    <h1 class="app-title" id="pageTitle">EQUIPE</h1>
                    <div class="header-actions">
                        <span style="font-size: 0.8rem; color: #888;">Pedro Mestre dos Anjos</span>
                        <div class="avatar-small"><img src="https://i.pravatar.cc/150?img=11"></div>
                    </div>
                </header>

                <div id="viewMediators">
                    <div class="desktop-controls">
                        <div class="search-container">
                            <i class="fa-solid fa-magnifying-glass search-icon"></i>
                            <input type="text" placeholder="Buscar por nome ou cargo..." id="searchInput">
                        </div>
                        <button class="save-btn" id="btnSyncDrive" style="background-color: #4285f4; color: white;">
                            <i class="fa-solid fa-rotate"></i> SINCRONIZAR FORMS
                        </button>
                        <button class="save-btn" id="btnExportTeamCSV" style="background-color: #2ecc71; color: white;">
                            <i class="fa-solid fa-file-excel"></i> PLANILHA
                        </button>
                        <button class="save-btn" id="btnAddNewDesktop">
                            <i class="fa-solid fa-plus"></i> NOVO MEMBRO
                        </button>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-label">TOTAL EQUIPE</span>
                            <span class="stat-number" id="totalCount">0</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label" style="color: #f1c40f;">STATUS ALERTA</span>
                            <span class="stat-number" id="alertCount" style="color: #ff4d4d;">0</span>
                        </div>
                    </div>

                    <div id="mediatorList" class="mediator-list"></div>
                </div>

                <div id="viewDashboard" style="display: none;">
                    <div class="balance-container">
                        <span class="balance-label">SALDO EM CAIXA</span>
                        <h1 class="balance-value" id="displayBalance">R$ 0,00</h1>
                    </div>
                    <div class="finance-controls">
                        <div class="fin-row">
                            <select id="finCategory" class="fin-select">
                                <option value="Contratação">Contratação</option>
                                <option value="Mensalidade">Mensalidade</option>
                                <option value="Gasto">Gasto</option>
                            </select>
                            <input type="number" id="finValue" class="fin-input-small" placeholder="0,00">
                            <button id="btnSaveFinance" class="save-btn">LANÇAR</button>
                        </div>
                    </div>
                    <div id="transactionList" class="transaction-list"></div>
                </div>

                <div id="viewReports" style="display: none;">
                    <div class="section-header">
                        <h2>RELATÓRIOS GERAIS</h2>
                    </div>
                    <div id="reportsList" class="reports-container"></div>
                </div>
            </main>

            <button class="fab" id="fabAddUser"><i class="fa-solid fa-plus"></i></button>
        </div>

        <div id="editModal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h2 style="color: #f1c40f;">Editar Membro</h2>
                <input type="hidden" id="editUserId">
                <div class="input-group"><label>Nome</label><input type="text" id="editName" class="custom-input"></div>
                <div class="input-group">
                    <label>Cargo</label>
                    <select id="editRole" class="custom-input">
                        <option value="ADM">ADM</option>
                        <option value="SUPORTE">SUPORTE</option>
                        <option value="AUXILIAR">AUXILIAR</option>
                        <option value="MEMBRO">MEMBRO</option>
                    </select>
                </div>
                <div class="input-group"><label>Dias</label><input type="number" id="editDays" class="custom-input"></div>
                <button id="btnSaveEdit" class="save-btn">SALVAR ALTERAÇÕES</button>
            </div>
        </div>

        <div id="addModal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h2 style="color: #f1c40f;">Novo Membro</h2>
                <div class="input-group"><label>Nome</label><input type="text" id="addName" class="custom-input"></div>
                <div class="input-group">
                    <label>Cargo</label>
                    <select id="addRole" class="custom-input">
                        <option value="ADM">ADM</option>
                        <option value="SUPORTE">SUPORTE</option>
                        <option value="AUXILIAR">AUXILIAR</option>
                    </select>
                </div>
                <div class="input-group"><label>Dias</label><input type="number" id="addDays" class="custom-input"></div>
                <button id="btnSaveNew" class="save-btn">CADASTRAR</button>
            </div>
        </div>

    </div>

    <script src="js/script.js"></script>
</body>
</html>
