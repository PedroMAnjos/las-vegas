<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnjoW Panel Admin</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- LOGIN -->
<section id="loginScreen" class="login-container">
    <div class="login-glass-box">
        <div class="logo-wrapper">
            <i class="fa-solid fa-shield-halved main-gold-icon"></i>
        </div>

        <h1 class="brand-name">ANJOW SS</h1>
        <p class="brand-tagline">Security Terminal v4.0</p>

        <div class="auth-form">
            <div class="input-field-group">
                <label>OPERADOR</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="loginUser" placeholder="admin">
                </div>
            </div>

            <div class="input-field-group">
                <label>CHAVE DE ACESSO</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="loginPass" placeholder="••••••••">
                </div>
            </div>

            <button id="btnLogin" class="btn-auth-submit">
                <i class="fa-solid fa-right-to-bracket"></i> AUTENTICAR
            </button>

            <div id="loginError" class="auth-error-msg">Acesso Negado</div>
        </div>
    </div>
</section>


<!-- APP -->
<div id="appScreen" class="app-layout" style="display:none;">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div>
            <div class="sidebar-brand">
                <i class="fa-solid fa-crown"></i>
                <span>ADMIN</span>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item active" data-view="viewMediators">
                        <i class="fa-solid fa-users"></i>
                        <span>EQUIPE</span>
                    </li>

                    <li class="nav-item" data-view="viewFinance">
                        <i class="fa-solid fa-wallet"></i>
                        <span>FINANCEIRO</span>
                    </li>

                    <li class="nav-item" data-view="viewReports">
                        <i class="fa-solid fa-chart-line"></i>
                        <span>RELATÓRIOS</span>
                    </li>
                </ul>
            </nav>
        </div>

        <button id="btnLogout" class="btn-logout-sidebar">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>SAIR</span>
        </button>
    </aside>


    <!-- MAIN -->
    <main class="main-content">

        <!-- HEADER -->
        <div class="content-header">
            <h2 id="pageTitle">Gestão de Equipe</h2>
            <div class="live-clock" id="clock"></div>
        </div>


        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="search-wrapper">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar membros...">
            </div>

            <div class="toolbar-actions">
                <button class="btn-primary blue-glow"><i class="fa-solid fa-rotate"></i> Sync</button>
                <button class="btn-primary green-glow"><i class="fa-solid fa-file"></i> CSV</button>
                <button class="btn-primary gold-glow"><i class="fa-solid fa-plus"></i> Novo</button>
            </div>
        </div>


        <!-- FILTROS -->
        <div class="filter-tabs">
            <button class="tab active">Todos</button>
            <button class="tab">ADM</button>
            <button class="tab">SUP</button>
            <button class="tab">AUX</button>
        </div>


        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon-box blue"><i class="fa-solid fa-users"></i></div>
                <div class="stat-info">
                    <label>Total</label>
                    <h3 id="totalCount">3</h3>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon-box red"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <div class="stat-info">
                    <label>Alertas</label>
                    <h3 id="alertCount">1</h3>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon-box green"><i class="fa-solid fa-circle-check"></i></div>
                <div class="stat-info">
                    <label>Ativos</label>
                    <h3>2</h3>
                </div>
            </div>
        </div>


        <!-- TABELA -->
        <div class="data-container">

            <div class="data-header-grid">
                <span>MEMBRO</span>
                <span>DIAS</span>
                <span>AÇÕES</span>
            </div>

            <!-- ADM -->
            <div class="table-row">
                <div>
                    <div class="row-name">Pedro Mestre</div>
                    <span class="role-badge adm">ADM</span>
                </div>
                <div class="days-count text-green">10</div>
                <div>
                    <button class="action-btn">Editar</button>
                    <button class="action-btn text-red">Del</button>
                </div>
            </div>

            <!-- SUP -->
            <div class="table-row">
                <div>
                    <div class="row-name">Maria Silva</div>
                    <span class="role-badge sup">SUP</span>
                </div>
                <div class="days-count text-yellow">3</div>
                <div>
                    <button class="action-btn">Editar</button>
                    <button class="action-btn text-red">Del</button>
                </div>
            </div>

            <!-- AUX -->
            <div class="table-row">
                <div>
                    <div class="row-name">João Souza</div>
                    <span class="role-badge aux">AUX</span>
                </div>
                <div class="days-count text-red">0</div>
                <div>
                    <button class="action-btn">Editar</button>
                    <button class="action-btn text-red">Del</button>
                </div>
            </div>

        </div>

    </main>
</div>


<!-- MODAL -->
<div id="modal" class="modal-overlay">
    <div class="modal-content">

        <div class="modal-header">
            <h3>Editar Membro</h3>
            <button class="close-modal">&times;</button>
        </div>

        <div class="form-group-full">
            <label>Nome</label>
            <input class="modal-input" type="text">
        </div>

        <div class="form-row-split">
            <select class="modal-input">
                <option>ADM</option>
                <option>SUP</option>
                <option>AUX</option>
            </select>

            <input class="modal-input" type="number" placeholder="Dias">
        </div>

        <button class="btn-modal-save">Salvar</button>
    </div>
</div>


<script>
// LOGIN
document.getElementById("btnLogin").onclick = () => {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appScreen").style.display = "flex";
};

// CLOCK
setInterval(() => {
    const now = new Date();
    document.getElementById("clock").innerText = now.toLocaleTimeString();
}, 1000);

// NAV
const navItems = document.querySelectorAll(".nav-item");
navItems.forEach(item => {
    item.onclick = () => {
        navItems.forEach(i => i.classList.remove("active"));
        item.classList.add("active");
    };
});
</script>

</body>
</html>
