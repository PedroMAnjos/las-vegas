<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - AnjoW SS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loginScreen" class="login-wrapper">
        <div class="login-box">
            <div class="login-logo"><i class="fa-solid fa-shield-halved"></i></div>
            <h1 class="app-title">Painel Admin</h1>
            <p style="color:#888; font-size:0.8rem; margin-bottom:30px;">Acesso Restrito - Dev. Pedro Mestre</p>
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="loginUser" class="custom-input" placeholder="admin">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="loginPass" class="custom-input" placeholder="admin">
            </div>
            <button id="btnLogin" class="save-btn">ACESSAR SISTEMA</button>
            <p id="loginError" style="color:#ff4d4d; display:none; margin-top:10px;">Credenciais inválidas.</p>
        </div>
    </div>

    <div id="appScreen" style="display: none;">
        <div class="main-layout">
            
            <nav class="side-nav">
                <div class="nav-brand">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>ADMIN</span>
                </div>
                <div class="nav-items-wrapper">
                    <div class="nav-item active" id="navMediators"><i class="fa-solid fa-users"></i><span>EQUIPE</span></div>
                    <div class="nav-item" id="navDashboard"><i class="fa-solid fa-calculator"></i><span>FINANCEIRO</span></div>
                    <div class="nav-item" id="navReports"><i class="fa-solid fa-file-contract"></i><span>RELATÓRIOS</span></div>
                </div>
                <div class="nav-item logout-item" id="btnLogout"><i class="fa-solid fa-right-from-bracket"></i><span>SAIR</span></div>
            </nav>

            <main class="content-area">
                <header class="main-header">
                    <h1 id="pageTitle">EQUIPE</h1>
                    <div class="header-user">
                        <div class="user-info">
                            <span class="user-name">Pedro Mestre dos Anjos</span>
                            <span class="user-role">Desenvolvedor</span>
                        </div>
                        <div class="avatar-small"><img src="https://i.pravatar.cc/150?img=11"></div>
                    </div>
                </header>

                <div id="viewMediators" class="view-section">
                    <div class="controls-row">
                        <div class="search-box">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" id="searchInput" placeholder="Buscar por nome ou cargo...">
                        </div>
                        <div class="action-buttons">
                            <button class="btn-action blue" id="btnSyncDrive"><i class="fa-solid fa-rotate"></i> SINCRONIZAR</button>
                            <button class="btn-action green" id="btnExportTeamCSV"><i class="fa-solid fa-file-excel"></i> EXPORTAR</button>
                            <button class="btn-action gold" id="btnAddNewDesktop"><i class="fa-solid fa-plus"></i> NOVO</button>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <p>TOTAL EQUIPE</p>
                            <h2 id="totalCount">0</h2>
                        </div>
                        <div class="stat-card alert">
                            <p>STATUS ALERTA</p>
                            <h2 id="alertCount">0</h2>
                        </div>
                    </div>

                    <div class="list-container">
                        <div class="list-header">
                            <span>MEMBRO / CARGO</span>
                            <span>TEMPO RESTANTE</span>
                            <span>AÇÕES</span>
                        </div>
                        <div id="mediatorList"></div>
                    </div>
                </div>

                <div id="viewDashboard" class="view-section" style="display: none;">
                    <div class="balance-banner">
                        <p>SALDO TOTAL</p>
                        <h1 id="displayBalance">R$ 0,00</h1>
                    </div>
                    <div class="finance-form">
                        </div>
                    <div id="transactionList"></div>
                </div>

                <div id="viewReports" class="view-section" style="display: none;">
                    <div id="reportsList"></div>
                </div>
            </main>
        </div>

        <div id="editModal" class="modal">
            <div class="modal-content">
                <header class="modal-header">
                    <h2>Editar Membro</h2>
                    <span class="close-modal">&times;</span>
                </header>
                <div class="modal-body">
                    <input type="hidden" id="editUserId">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="editName" class="custom-input">
                    </div>
                    <div class="form-group">
                        <label>Cargo</label>
                        <select id="editRole" class="custom-input">
                            <option value="ADM">ADM</option>
                            <option value="SUPORTE">SUPORTE</option>
                            <option value="AUXILIAR">AUXILIAR</option>
                            <option value="MEMBRO">MEMBRO</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Dias de Acesso</label>
                        <input type="number" id="editDays" class="custom-input">
                    </div>
                    <button id="btnSaveEdit" class="save-btn">SALVAR ALTERAÇÕES</button>
                </div>
            </div>
        </div>

        <div id="addModal" class="modal">
            <div class="modal-content">
                <header class="modal-header">
                    <h2>Novo Cadastro</h2>
                    <span class="close-modal">&times;</span>
                </header>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" id="addName" class="custom-input">
                    </div>
                    <div class="form-group">
                        <label>Cargo</label>
                        <select id="addRole" class="custom-input">
                            <option value="ADM">ADM</option>
                            <option value="SUPORTE">SUPORTE</option>
                            <option value="AUXILIAR">AUXILIAR</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Dias</label>
                        <input type="number" id="addDays" class="custom-input">
                    </div>
                    <button id="btnSaveNew" class="save-btn">CADASTRAR</button>
                </div>
            </div>
        </div>

        <button class="fab" id="fabAddUser"><i class="fa-solid fa-plus"></i></button>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
