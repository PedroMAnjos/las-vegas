<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnjoW SS - Gestão de Elite</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <section id="loginScreen" class="login-wrapper">
        <div class="login-box">
            <div class="login-logo"><i class="fa-solid fa-shield-halved"></i></div>
            <h1 class="app-title">Painel Admin</h1>
            <p style="color:#888; font-size:0.8rem; margin-bottom:30px;">Acesso Restrito - Dev. Pedro Mestre</p>
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="loginUser" class="custom-input" placeholder="admin">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="loginPass" class="custom-input" placeholder="admin">
            </div>
            <button id="btnLogin" class="save-btn">ACESSAR SISTEMA</button>
            <p id="loginError" style="color:var(--alert-red); display:none; margin-top:15px;">Credenciais inválidas.</p>
        </div>
    </section>

    <div id="appScreen" style="display: none;">
        <div class="main-layout">
            <nav class="side-nav">
                <div class="nav-brand"><i class="fa-solid fa-crown"></i><span>ADMIN</span></div>
                <div class="nav-item active" id="navMediators" data-view="viewMediators"><i class="fa-solid fa-users"></i><span>EQUIPE</span></div>
                <div class="nav-item" id="navDashboard" data-view="viewDashboard"><i class="fa-solid fa-calculator"></i><span>FINANCEIRO</span></div>
                <div class="nav-item" id="navReports" data-view="viewReports"><i class="fa-solid fa-file-contract"></i><span>RELATÓRIOS</span></div>
                <div class="nav-item logout-btn" id="btnLogout"><i class="fa-solid fa-right-from-bracket"></i><span>SAIR</span></div>
            </nav>

            <main class="content-area">
                <header class="main-header">
                    <h1 class="app-title" id="pageTitle">EQUIPE</h1>
                    <div class="header-actions">
                        <span class="user-name">Administrador Sênior</span>
                        <div class="avatar-small"><img src="https://i.pravatar.cc/150?img=11"></div>
                    </div>
                </header>

                <div id="viewMediators" class="view-section">
                    <div class="desktop-controls">
                        <div class="search-container">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" id="searchInput" placeholder="Pesquisar por nome ou cargo...">
                        </div>
                        <div class="btn-group">
                            <button class="action-btn blue" id="btnSyncDrive"><i class="fa-solid fa-rotate"></i> SYNC</button>
                            <button class="action-btn green" id="btnExportCSV"><i class="fa-solid fa-file-excel"></i> CSV</button>
                            <button class="action-btn gold" id="btnAddNew"><i class="fa-solid fa-plus"></i> NOVO</button>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-label">TOTAL EQUIPE</span>
                            <span class="stat-number" id="totalCount">0</span>
                        </div>
                        <div class="stat-card alert">
                            <span class="stat-label">STATUS ALERTA</span>
                            <span class="stat-number" id="alertCount">0</span>
                        </div>
                    </div>

                    <div class="list-container">
                        <div class="list-header-row">
                            <span>MEMBRO / CARGO</span>
                            <span style="text-align: center;">TEMPO RESTANTE</span>
                            <span style="text-align: right;">AÇÕES</span>
                        </div>
                        <div id="mediatorList"></div>
                    </div>
                </div>

                <div id="viewDashboard" class="view-section" style="display:none;">
                    <div class="balance-container">
                        <span class="balance-label">SALDO EM CAIXA</span>
                        <h1 id="displayBalance" class="balance-value">R$ 0,00</h1>
                    </div>
                </div>
            </main>
        </div>

        <div id="editModal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h2 class="text-gold">Editar Membro</h2>
                <input type="hidden" id="editUserId">
                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" id="editName" class="custom-input">
                </div>
                <div class="input-group">
                    <label>Cargo</label>
                    <select id="editRole" class="custom-input">
                        <option value="ADM">ADM</option>
                        <option value="SUPORTE">SUPORTE</option>
                        <option value="AUXILIAR">AUXILIAR</option>
                        <option value="MEMBRO">MEMBRO</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Dias Restantes</label>
                    <input type="number" id="editDays" class="custom-input">
                </div>
                <button id="btnSaveEdit" class="save-btn">SALVAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
